version: 2
before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd/kitty
    binary: kitty
    env:
      - CGO_ENABLED=0
    goos:
      - linux
#      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/ImSingee/kitty/internal/version.version={{.Version}}
      - -X github.com/ImSingee/kitty/internal/version.commit={{.Commit}}
      - -X github.com/ImSingee/kitty/internal/version.buildAt={{.Date}}
dockers_v2:
  - images:
      - singee/kitty
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-{{ .Os }}.{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs?:'
      - '^tests?:'
      - '^ci:'
brews:
  - name: kitty
    repository:
      owner: ImSingee
      name: homebrew-kitty
      token: "{{ .Env.HOMEBREW_RELEASE_GITHUB_TOKEN }}"
    install: |
      bin.install "kitty"
    test: |
      system "#{bin}/foo --version"

